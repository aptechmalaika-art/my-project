<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="contact.css">
</head>
<body>

<!-- ================= Banner ================= -->

<section class="contact-banner">

    <div class="overlay"></div>

    <div class="banner-content">
        <h1>Contact Me</h1>
        <p>Let's connect and create something amazing together.</p>
    </div>

</section>

<!-- ================= Contact Info ================= -->

<section class="contact-info">

    <div class="info-card">

        <i class="fa-solid fa-envelope"></i>

        <h3>Email</h3>

        <p>malaika@example.com</p>

    </div>

    <div class="info-card">

        <i class="fa-solid fa-phone"></i>

        <h3>Phone</h3>

        <p>+92 300 1234567</p>

    </div>

    <div class="info-card">

        <i class="fa-solid fa-location-dot"></i>

        <h3>Location</h3>

        <p>Karachi, Pakistan</p>

    </div>

</section>

<!-- ================= Contact Form ================= -->

<section class="contact">

    <div class="contact-image">

        <img src="img/contact.png" alt="Contact">

    </div>

    <div class="contact-form">

        <h2>Send Me a Message</h2>

        <form id="contactForm">

            <input
                type="text"
                placeholder="Full Name"
                pattern="[A-Za-z ]{3,30}"
                title="Only letters are allowed"
                required>

            <input
                type="email"
                placeholder="Email Address"
                required>

            <input
                type="tel"
                placeholder="Phone Number"
                pattern="[0-9]{11}"
                title="Enter 11 digit phone number"
                required>

            <input
                type="text"
                placeholder="Subject"
                required>

            <textarea
                rows="6"
                placeholder="Write Your Message..."
                required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

</section>

<!-- ================= Google Map ================= -->

<section class="map">

    <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3620.0569900653625!2d67.073457!3d24.860735!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3eb33e6d8d7b4fbb%3A0x5c1c1e2f5a1c5b7d!2sKarachi!5e0!3m2!1sen!2s!4v1710000000000!5m2!1sen!2s"
        width="100%"
        height="450"
        style="border:0;"
        allowfullscreen=""
        loading="lazy">
    </iframe>

</section>

<!-- ================= Footer ================= -->

<footer>

    <h2>Malaika Shah</h2>

    <p>Frontend Developer | UI/UX Designer</p>

    <div class="social">

        <a href="#"><i class="fa-brands fa-github"></i></a>

        <a href="#"><i class="fa-brands fa-linkedin"></i></a>

        <a href="#"><i class="fa-brands fa-instagram"></i></a>

        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>

    </div>

    <p class="copy">
        © 2026 Malaika Shah. All Rights Reserved.
    </p>

</footer>

<!-- JavaScript -->
<script src="contact.js"></script>

</body>
</html>
